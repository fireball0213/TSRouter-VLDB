# TSRouter-VLDB artifact bundle layout.
schema_version: 1
default_hf_repo: "LAMDA-shihn/tsrouter-v1-artifacts"
default_revision: "main"
local_artifact_root_env: "TSROUTER_VLDB_ARTIFACT_ROOT"
hf_repo_env: "TSROUTER_VLDB_HF_REPO"

excluded_public_artifacts:
  - "results_artifacts/caches/GE_test_sample/cl512_n1_std_wseven_ss2025.*"
  - "results_artifacts/caches/GE_test_sample/cl512_n10_std_wseven_ss2025.*"
  - "*ablation*"
  - "*min_task1_v2*"
  - "*min_task10_v2*"

groups:
  all:
    description: "All public reproduction artifacts."
    bundles:
      - "profile_sources"
      - "tsfm_results_stage20"
      - "tsrouter_core_stage20"
      - "baselines_stage20"
      - "task_cache_stage20"
      - "tables_figures_stage20"
  core:
    description: "Artifacts required for TSFM reuse, PROFILE reuse, TSRouter-main, TSRouter-fast, and table refresh."
    bundles:
      - "profile_sources"
      - "tsfm_results_stage20"
      - "tsrouter_core_stage20"
      - "task_cache_stage20"
      - "tables_figures_stage20"
  baselines:
    description: "Artifacts required for paper baseline reproduction."
    bundles:
      - "tsfm_results_stage20"
      - "tsrouter_core_stage20"
      - "baselines_stage20"
      - "task_cache_stage20"
      - "tables_figures_stage20"
  tables:
    description: "Table and figure source artifacts."
    bundles:
      - "tables_figures_stage20"

bundles:
  profile_sources:
    filename: "bundles/profile_sources_v1.tar.zst"
    required: true
    extract_to: "."
    staging_root: "."
    contents:
      - "data/profile_sources/chronos/"
      - "data/profile_sources/moirai_timesfm/"
    required_paths:
      - "data/profile_sources/chronos/chronos_profile_source.tsf"
      - "data/profile_sources/moirai_timesfm/domain_energy.npy"
      - "data/profile_sources/moirai_timesfm/domain_nature.npy"
      - "data/profile_sources/moirai_timesfm/domain_healthcare.npy"
      - "data/profile_sources/moirai_timesfm/domain_web_cloudops.npy"
      - "data/profile_sources/moirai_timesfm/domain_sales.npy"
    backend_mounts:
      - source: "data/profile_sources/chronos/chronos_profile_source.tsf"
        target: "Dataset/Repr_data_sourse/c62.tsf"
      - source: "data/profile_sources/moirai_timesfm/domain_energy.npy"
        target: "Dataset/Repr_data_sourse/energy_num1w_len992_sd2029_std.npy"
      - source: "data/profile_sources/moirai_timesfm/domain_nature.npy"
        target: "Dataset/Repr_data_sourse/nature_num1w_len992_sd2029_std.npy"
      - source: "data/profile_sources/moirai_timesfm/domain_healthcare.npy"
        target: "Dataset/Repr_data_sourse/healthcare_num1w_len992_sd2029_std.npy"
      - source: "data/profile_sources/moirai_timesfm/domain_web_cloudops.npy"
        target: "Dataset/Repr_data_sourse/web_cloudops_num1w_len992_sd2029_std.npy"
      - source: "data/profile_sources/moirai_timesfm/domain_sales.npy"
        target: "Dataset/Repr_data_sourse/sales_num1w_len992_sd2029_std.npy"
    legacy_sources:
      - "Dataset/Repr_data_sourse/c62.tsf"
      - "Dataset/Repr_data_sourse/energy_num1w_len992_sd2029_std.npy"
      - "Dataset/Repr_data_sourse/nature_num1w_len992_sd2029_std.npy"
      - "Dataset/Repr_data_sourse/healthcare_num1w_len992_sd2029_std.npy"
      - "Dataset/Repr_data_sourse/web_cloudops_num1w_len992_sd2029_std.npy"
      - "Dataset/Repr_data_sourse/sales_num1w_len992_sd2029_std.npy"

  tsfm_results_stage20:
    filename: "bundles/stage20_tsfm_results_v1.tar.zst"
    required: true
    extract_to: "."
    staging_root: "artifacts/tsfm_results"
    contents:
      - "artifacts/tsfm_results/results_csv/TSFM/cl_512/"
    required_paths:
      - "artifacts/tsfm_results/results_csv/TSFM/cl_512/*/all_results.csv"
      - "artifacts/tsfm_results/results_csv/TSFM/cl_512/*/per_window_results.csv"
    backend_mounts:
      - source: "artifacts/tsfm_results/results_csv/TSFM/cl_512"
        target: "results_csv/TSFM/cl_512"
    legacy_sources:
      - pattern: "results_csv/TSFM/cl_512/"
        required: true
        base_path: "results_csv/TSFM"
        release_path: "artifacts/tsfm_results/results_csv/TSFM"
        exclude_patterns:
          - "*.lock"

