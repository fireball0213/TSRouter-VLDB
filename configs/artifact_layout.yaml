# TSRouter-VLDB artifact bundle layout.
schema_version: 1
default_hf_repo: "LAMDA-shihn/tsrouter-v1-artifacts"
default_revision: "main"
local_artifact_root_env: "TSROUTER_VLDB_ARTIFACT_ROOT"
hf_repo_env: "TSROUTER_VLDB_HF_REPO"

groups:
  results:
    description: "Released result records and table inputs."
    bundles:
      - "tsfm_results_stage20"
      - "tsrouter_core_stage20"
      - "baselines_stage20"
      - "tables_figures_stage20"
  route:
    description: "Published capability representations, request samples, and TSFM metrics for route validation."
    bundles:
      - "tsfm_results_stage20"
      - "tsrouter_core_stage20"
      - "task_cache_stage20"
  core:
    description: "Profile inputs, TSFM metrics, and request samples for rebuilding the TSRouter core."
    bundles:
      - "profile_sources"
      - "tsfm_results_stage20"
      - "task_cache_stage20"
  all:
    description: "Complete public artifact collection."
    bundles:
      - "profile_sources"
      - "tsfm_results_stage20"
      - "tsrouter_core_stage20"
      - "baselines_stage20"
      - "task_cache_stage20"
      - "tables_figures_stage20"
  baselines:
    description: "Artifacts required for paper baseline reproduction."
    bundles:
      - "tsfm_results_stage20"
      - "tsrouter_core_stage20"
      - "baselines_stage20"
      - "task_cache_stage20"
      - "tables_figures_stage20"
  tables:
    description: "Table and figure source artifacts."
    bundles:
      - "tables_figures_stage20"

bundles:
  profile_sources:
    filename: "bundles/profile_sources_v1.tar.zst"
    required: true
    extract_to: "."
    contents:
      - "data/profile_sources/chronos/"
      - "data/profile_sources/moirai_timesfm/"

  tsfm_results_stage20:
    filename: "bundles/stage20_tsfm_results_v1.tar.zst"
    required: true
    extract_to: "."
    contents:
      - "artifacts/tsfm_results/results_csv/TSFM/cl_512/"

  tsrouter_core_stage20:
    filename: "bundles/stage20_tsrouter_core_v1.tar.zst"
    required: true
    extract_to: "."
    contents:
      - "artifacts/tsrouter_core/results_artifacts/TSRouter/"
      - "artifacts/tsrouter_core/results_artifacts/caches/Sampled_repr_pool/"
      - "artifacts/tsrouter_core/results_csv/TSRouter/"

  baselines_stage20:
    filename: "bundles/stage20_baselines_v1.tar.zst"
    required: true
    extract_to: "."
    contents:
      - "artifacts/baseline_results/results_artifacts/baselines/selectors/"
      - "artifacts/baseline_results/results_csv/baselines/"

  task_cache_stage20:
    filename: "bundles/stage20_task_cache_v1.tar.zst"
    required: true
    extract_to: "."
    contents:
      - "artifacts/task_sample_cache/results_artifacts/caches/GE_test_sample/"

  tables_figures_stage20:
    filename: "bundles/stage20_tables_figures_v1.tar.zst"
    required: true
    extract_to: "."
    contents:
      - "artifacts/tables_figures/Dataset/"
      - "artifacts/tables_figures/results_csv/TSRouter/vldb/"
      - "artifacts/tables_figures/figs/vldb_results/stage20/"

manifest:
  filename: "manifest.json"
  checksum_file: "checksums.sha256"
  required_fields:
    - "schema_version"
    - "bundle_id"
    - "filename"
    - "sha256"
    - "size_bytes"
    - "extract_to"
    - "contents"
