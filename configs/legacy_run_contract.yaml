# TSRouter-VLDB public execution contract.
schema_version: 1

variant_policy:
  main:
    route_efficiency_mode: false
  fast:
    route_efficiency_mode: true
  allowed_main_fast_delta:
    - "route_efficiency_mode"
    - "derived_route_id"
    - "derived_route_profile_id"

public_command_mapping:
  tsfm:
    purpose: "Run or validate cached TSFM zero-shot results."
    artifact_groups:
      - "tsfm_results_stage20"
  profile:
    purpose: "Build or validate PROFILE artifacts."
    artifact_groups:
      - "profile_sources"
      - "tsrouter_core_stage20"
  route:
    purpose: "Run or validate TSRouter-main and TSRouter-fast results."
    artifact_groups:
      - "tsfm_results_stage20"
      - "tsrouter_core_stage20"
      - "task_cache_stage20"
  insert:
    purpose: "Run or validate route-index maintenance summaries."
    artifact_groups:
      - "tsrouter_core_stage20"
      - "baselines_stage20"
  baselines:
    purpose: "Run or validate paper baseline results."
    artifact_groups:
      - "tsfm_results_stage20"
      - "tsrouter_core_stage20"
      - "baselines_stage20"
      - "task_cache_stage20"
  summary:
    purpose: "Run or validate released result tables."
    artifact_groups:
      - "tsfm_results_stage20"
      - "tsrouter_core_stage20"
      - "baselines_stage20"
      - "tables_figures_stage20"

public_reuse_modes:
  all:
    description: "Use existing local or downloaded artifacts when available."
  none:
    description: "Run the selected command group without artifact-backed skip."
  partial:
    description: "Comma-separated artifact groups; command planning reports which groups are reused."
