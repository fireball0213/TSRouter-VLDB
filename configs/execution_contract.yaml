# TSRouter-VLDB public execution contract.
schema_version: 1

variant_policy:
  main:
    route_efficiency_mode: false
  fast:
    route_efficiency_mode: true
  allowed_main_fast_delta:
    - "route_efficiency_mode"
    - "derived_route_id"
    - "derived_route_profile_id"

public_command_mapping:
  profile:
    purpose: "Build or validate TSRouter capability representations."
    artifact_groups:
      - "profile_sources"
  route:
    purpose: "Run or validate TSRouter-main and TSRouter-fast results."
    artifact_groups:
      - "tsfm_results_stage20"
      - "tsrouter_core_stage20"
      - "task_cache_stage20"
  insert:
    purpose: "Run or validate route-index maintenance summaries."
    artifact_groups:
      - "tsrouter_core_stage20"
      - "baselines_stage20"
  baselines:
    purpose: "Run or validate paper baseline results."
    artifact_groups:
      - "tsfm_results_stage20"
      - "tsrouter_core_stage20"
      - "baselines_stage20"
      - "task_cache_stage20"
  summary:
    purpose: "Run or validate released result tables."
    artifact_groups:
      - "tsfm_results_stage20"
      - "tsrouter_core_stage20"
      - "baselines_stage20"
      - "tables_figures_stage20"

public_reuse_modes:
  results:
    artifact_group: "results"
    requirements:
      released_artifacts:
        - "TSFM result records"
        - "TSRouter and baseline result records"
        - "table inputs"
      external_downloads: []
    description: "Validate released results and tables."
  route:
    artifact_group: "route"
    requirements:
      released_artifacts:
        - "published capability representations"
        - "request-sample cache"
        - "TSFM metric records"
      external_downloads: []
    description: "Rerun TSRouter routing from published representations and request samples."
  core:
    artifact_group: "core"
    requirements:
      released_artifacts:
        - "profile source inputs"
        - "request-sample cache"
        - "TSFM metric records"
      external_downloads:
        - "Salesforce/GiftEval"
        - "official TSFM checkpoints"
    description: "Rebuild TSRouter capability representations and routing with public data and official checkpoints."
