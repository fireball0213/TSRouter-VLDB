# TSRouter-VLDB profile source contract.
schema_version: 1
paper_claim: "PROFILE anchors are sampled by domain from the public pretraining data of Chronos, Moirai, and TimesFM."
backend_token_set: "c-e-n-h-w-s"
release_profile_source_set: "chronos+moirai_timesfm_domain_stratified"

sources:
