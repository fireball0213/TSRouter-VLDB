# TSRouter-VLDB profile source contract.
schema_version: 1
paper_claim: "PROFILE anchors are sampled by domain from the public pretraining data of Chronos, Moirai, and TimesFM."
release_profile_source_set: "chronos_moirai_timesfm"

sources:
  - release_id: "chronos"
    release_path: "data/profile_sources/chronos/chronos_profile_source.tsf"
    paper_label: "Chronos pretraining source"
    source_family: "Chronos"
    required_for_main_results: true

  - release_id: "domain_energy"
    release_path: "data/profile_sources/moirai_timesfm/domain_energy.npy"
    paper_label: "domain-stratified sample from Moirai and TimesFM pretraining sources"
    source_family: "Moirai+TimesFM"
    required_for_main_results: true

  - release_id: "domain_nature"
    release_path: "data/profile_sources/moirai_timesfm/domain_nature.npy"
    paper_label: "domain-stratified sample from Moirai and TimesFM pretraining sources"
    source_family: "Moirai+TimesFM"
    required_for_main_results: true

  - release_id: "domain_healthcare"
    release_path: "data/profile_sources/moirai_timesfm/domain_healthcare.npy"
    paper_label: "domain-stratified sample from Moirai and TimesFM pretraining sources"
    source_family: "Moirai+TimesFM"
    required_for_main_results: true

  - release_id: "domain_web_cloudops"
    release_path: "data/profile_sources/moirai_timesfm/domain_web_cloudops.npy"
    paper_label: "domain-stratified sample from Moirai and TimesFM pretraining sources"
    source_family: "Moirai+TimesFM"
    required_for_main_results: true

  - release_id: "domain_sales"
    release_path: "data/profile_sources/moirai_timesfm/domain_sales.npy"
    paper_label: "domain-stratified sample from Moirai and TimesFM pretraining sources"
    source_family: "Moirai+TimesFM"
    required_for_main_results: true

public_notes:
  - "Public docs and CLI output use release_id names."
  - "Large source files are distributed through the Hugging Face Dataset, not GitHub."
