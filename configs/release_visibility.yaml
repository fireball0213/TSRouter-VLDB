# TSRouter-VLDB release visibility contract.
schema_version: 1

github_public:
  - path: "README.md"
    description: "Public entry point and reproduction command overview."
  - path: "pyproject.toml"
    description: "Python package metadata and console entry point."
  - path: "requirements_core.txt"
    description: "Core dependencies for artifact checks and reproduction scripts."
  - path: "src/tsrouter_vldb/"
    description: "Release package source code."
  - path: "src/cli/tsrouter_vldb.py"
    description: "Script-path CLI entry point for server-style execution."
  - path: "configs/"
    description: "Small YAML contracts for model registry, artifact layout, source naming, and table reproduction."
  - path: "scripts/"
    description: "Small helper scripts for checks, contract validation, local staging, and Hugging Face artifact packaging."

huggingface_public:
  - path: "README.md"
    description: "Hugging Face Dataset Card."
  - path: "manifest.json"
    description: "Complete artifact index."
  - path: "checksums.sha256"
    description: "Bundle and manifest checksums."
  - path: "bundles/profile_sources_v1.tar.zst"
    description: "PROFILE source data."
  - path: "bundles/stage20_tsfm_results_v1.tar.zst"
    description: "TSFM cl_512 result artifacts for the 20-model zoo."
  - path: "bundles/stage20_tsrouter_core_v1.tar.zst"
    description: "PROFILE, ROUTE, INSERT, and capability-index artifacts for the paper-main TSRouter contract."
  - path: "bundles/stage20_baselines_v1.tar.zst"
    description: "Paper baseline result artifacts and baseline timing sidecars."
  - path: "bundles/stage20_task_cache_v1.tar.zst"
    description: "Step4 task sample cache for artifact-backed routing and Task-Probe baselines."
  - path: "bundles/stage20_tables_figures_v1.tar.zst"
    description: "Benchmark metadata, paper tables, figure source CSV files, and generated figures."

not_public:
  - category: "internal_docs"
    description: "Maintainer notes under TSRouter-VLDB/docs/; these files are written in Chinese and are not part of the GitHub release."
  - category: "submission_protocol_files"
    description: "Conference submission agreements, review-system exports, and private correspondence."
  - category: "credentials"
    description: "Access tokens, local environment files, private cache keys, and machine-specific credentials."
  - category: "non_redistributable_raw_data"
    description: "Raw datasets or model files whose license does not allow redistribution."
  - category: "local_machine_state"
    description: "Absolute local paths, temporary scratch outputs, editor metadata, and unverified experiment drafts."
  - category: "unreported_exploratory_branches"
    description: "Exploratory branches outside the paper's result, table, ablation, or baseline scope."
  - category: "deferred_ablation_artifacts"
    description: "Ablation caches and result files, including cl512_n1 and cl512_n10 task-sample artifacts, are outside the first public artifact bundle."
